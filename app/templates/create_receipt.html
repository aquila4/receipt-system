<!DOCTYPE html>
<html>
<head>
    <title>Create Receipt</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 20px;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #475569;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1e40af;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back {
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }

        /* MOBILE */
        @media(max-width: 600px) {
            .container {
                margin: 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <h2>🧾 Create Receipt</h2>
        <a href="/receipt/" class="back">← Back</a>
    </div>

    <div class="card">

        <form method="POST">

            <div class="form-group">
                <label>Customer Name</label>
                <input name="customer_name" placeholder="Enter customer name" required>
            </div>

            <div class="form-group">
                <label>Customer Email</label>
                <input name="customer_email" type="email" placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label>Amount (₦)</label>
                <input name="amount" type="number" placeholder="Enter amount" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Optional note..."></textarea>
            </div>

            <button class="btn">💾 Save Receipt</button>

        </form>

    </div>

</div>

</body>
</html>
